services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www
    command: >
      sh -lc "
        if [ ! -f .env ]; then cp .env.example .env; fi
        if [ ! -f vendor/autoload.php ]; then composer install --no-interaction; fi
        if ! grep -q '^APP_KEY=base64:' .env; then php artisan key:generate --force; fi
        php artisan migrate --force
        php artisan serve --host=0.0.0.0 --port=8000
      "
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: akatsuki
      DB_USERNAME: akatsuki
      DB_PASSWORD: akatsuki
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    command: >
      sh -lc "
        if [ ! -d node_modules ]; then npm install; fi
        npm run dev -- --host 0.0.0.0 --port 5173
      "
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: akatsuki
      MYSQL_USER: akatsuki
      MYSQL_PASSWORD: akatsuki
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  backend_vendor:
  frontend_node_modules:
  db_data:
